name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd netwatch-pro
          npm install

      - name: Build Web App
        run: |
          cd netwatch-pro
          npm run build

      - name: Sync Capacitor
        run: |
          cd netwatch-pro
          npx cap sync android

      - name: Build APK
        run: |
          cd netwatch-pro/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-pro-release.apk
          path: netwatch-pro/android/app/build/outputs/apk/release/*.apk
