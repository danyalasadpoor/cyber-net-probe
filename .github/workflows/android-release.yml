name: Android Release APK

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  release:
    name: Build Android Release APK
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: netwatch-pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: netwatch-pro/package-lock.json

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Build Web App
        run: npm run build

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradle executable
        run: chmod +x android/gradlew

      - name: Build APK
        working-directory: netwatch-pro/android
        run: |
          ./gradlew --no-daemon assembleRelease

      - name: Prepare APK
        working-directory: netwatch-pro
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/release/*.apk artifacts/netwatch-pro-release.apk
          ls -la artifacts

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-pro-release-apk
          path: netwatch-pro/artifacts/netwatch-pro-release.apk
          retention-days: 90
