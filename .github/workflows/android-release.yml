name: Android Release APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v1.0.0). Leave empty for a manual build."
        required: false

jobs:
  release:
    name: Build & Publish Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: netwatch-pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: netwatch-pro/package-lock.json

      - name: Setup Java (Temurin 21)
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Capacitor sync (android)
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-release-${{ runner.os }}-${{ hashFiles('netwatch-pro/android/**/*.gradle*', 'netwatch-pro/android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-release-${{ runner.os }}-
            gradle-${{ runner.os }}-

      - name: Decode signing keystore (optional)
        id: keystore
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Assemble release APK
        working-directory: netwatch-pro/android
        env:
          ANDROID_KEYSTORE_PATH: ${{ steps.keystore.outputs.signed == 'true' && 'release.keystore' || '' }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ "${{ steps.keystore.outputs.signed }}" = "true" ]; then
            ./gradlew --no-daemon assembleRelease
          else
            echo "No ANDROID_KEYSTORE_BASE64 secret; falling back to debug-signed release build."
            ./gradlew --no-daemon assembleDebug
          fi

      - name: Collect APK
        run: |
          mkdir -p artifacts
          if [ -f android/app/build/outputs/apk/release/app-release.apk ]; then
            cp android/app/build/outputs/apk/release/app-release.apk artifacts/netwatch-pro-release.apk
          elif [ -f android/app/build/outputs/apk/release/app-release-unsigned.apk ]; then
            cp android/app/build/outputs/apk/release/app-release-unsigned.apk artifacts/netwatch-pro-release-unsigned.apk
          else
            cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/netwatch-pro-debug.apk
          fi
          ls -la artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-pro-release-apk
          path: netwatch-pro/artifacts/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: Attach APK to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: netwatch-pro/artifacts/*.apk
          generate_release_notes: true
