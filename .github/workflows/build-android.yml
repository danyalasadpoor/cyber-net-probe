name: Build Android APK

on:
  workflow_dispatch:

jobs:
  android:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: netwatch-pro

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Capacitor sync
        run: npx cap sync android

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-pro-apk
          path: netwatch-pro/android/app/build/outputs/apk/debug/app-debug.apk
