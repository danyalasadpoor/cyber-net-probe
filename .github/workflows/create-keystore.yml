name: Create Android Keystore

on:
  workflow_dispatch:

jobs:
  keystore:
    runs-on: ubuntu-latest

    steps:
      - name: Create keystore
        run: |
          keytool -genkeypair \
            -v \
            -keystore netwatch-release.keystore \
            -alias netwatch \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass 12345678 \
            -keypass 12345678 \
            -dname "CN=NetWatch Pro, OU=Development, O=NetWatch, L=Unknown, ST=Unknown, C=US"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: netwatch-keystore
          path: netwatch-release.keystore
